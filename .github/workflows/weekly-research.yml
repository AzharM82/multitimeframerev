name: Weekly autoresearch round

on:
  schedule:
    # Saturday 18:00 PT = Sunday 01:00 UTC (PDT) / 02:00 UTC (PST)
    - cron: '0 1 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4-hour hard cap. Agent stops earlier per program.md.
    steps:
      - name: Checkout multitimeframerev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tos-reversal-scanner into subdir
        uses: actions/checkout@v4
        with:
          repository: AzharM82/tos-reversal-scanner
          token: ${{ secrets.GH_PAT_TOS_REPO }}
          # actions/checkout requires the path to be inside the workspace,
          # so we clone it as a subdir here. From autoresearch/, the agent
          # accesses it via ../tos-reversal-scanner/.
          path: tos-reversal-scanner
          fetch-depth: 0

      - name: Setup Python + uv
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install uv

      - name: Refresh data cache
        working-directory: autoresearch
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: uv run prepare.py

      - name: Baseline metric
        working-directory: autoresearch
        run: |
          uv run evaluate.py > baseline.log 2>&1 || true
          echo "::group::baseline"
          cat baseline.log
          echo "::endgroup::"

      - name: Configure git for round-branch commits
        run: |
          git config user.name  "autoresearch-bot"
          git config user.email "autoresearch-bot@users.noreply.github.com"

      - name: Run Claude Code research loop
        uses: anthropics/claude-code-action@v1
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are doing the weekly research round defined in
            autoresearch/program.md. Follow it exactly. You have ~3h30m
            of iteration time; track the wall clock and stop the loop
            with 10 minutes to spare so you can write the report and
            open the PR.

      - name: Safety-net PR (only if agent didn't open one)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" == autoresearch/* ]] && [ -z "$(gh pr list --head $BRANCH --json number -q '.[0].number')" ]; then
            git push -u origin "$BRANCH" || true
            gh pr create --title "autoresearch $BRANCH (no-report safety net)" \
              --body "Round branch had no PR when the job ended. See commits + autoresearch/results.tsv." \
              --base main || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoresearch-${{ github.run_id }}
          path: |
            autoresearch/baseline.log
            autoresearch/results.tsv
            autoresearch/run.log
            autoresearch/reports/
          retention-days: 30
