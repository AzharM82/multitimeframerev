<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Multi-Timeframe Reversal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-primary: #faf7f2;
      --bg-card: #ffffff;
      --border: #d4cfc6;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6459;
      --accent: #2c5282;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 13px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      max-width: 440px;
      width: 100%;
      padding: 32px 28px;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 26px;
      line-height: 1.2;
      margin: 0 0 6px;
    }
    .kicker {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }
    .rule {
      border-top: 2px solid var(--text-primary);
      border-bottom: 1px solid var(--border);
      padding-top: 3px;
      margin: 0 0 20px;
    }
    p { color: var(--text-secondary); line-height: 1.6; margin: 0 0 20px; }
    a.btn {
      display: inline-block;
      background: var(--text-primary);
      color: var(--bg-primary);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 11px 26px;
      border-radius: 3px;
    }
    a.btn:hover { background: var(--accent); }
    .foot {
      margin-top: 22px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="kicker">Multi-Timeframe Reversal</div>
    <h1>Sign-in required</h1>
    <div class="rule"></div>
    <p>
      This portal is private. Sign in with an authorised Google account to continue.
      If you have just signed out, you can sign back in below.
    </p>
    <a class="btn" href="/login">Sign in with Google</a>
    <div class="foot">Access is limited to approved accounts</div>
  </div>
</body>
</html>
